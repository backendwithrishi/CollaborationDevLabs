<!DOCTYPE html>
<html>
<head>
<title>Image Slider with Details</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="slider">

  <div class="slide">
    <img src="images/img3.jpeg">
    <div class="info">
      <h2>Yash Kumar</h2>
      <p>Frontend Developer</p>
    </div>
  </div>

  <div class="slide">
    <img src="images/img1.jpeg">
    <div class="info">
      <h2>Shivam Verma</h2>
      <p>Project Manager</p>
    </div>
  </div>

  <div class="slide">
    <img src="images/img2.jpeg">
    <div class="info">
      <h2>Kaushik Kumar</h2>
      <p>Backend Developer</p>
    </div>
  </div>

  <button class="prev" onclick="prevSlide()">❮</button>
  <button class="next" onclick="nextSlide()">❯</button>

</div>

<script src="script.js"></script>

</body>
</html>
